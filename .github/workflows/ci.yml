name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install API contract tooling
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend tests
        run: docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace/backend golang:1.26-alpine go test ./...

      - name: Run frontend component tests
        run: npm run test:run
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Lint OpenAPI contract
        run: npm run api:lint

      - name: Check generated OpenAPI types
        run: npm run api:types:check

  backend-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moneymate_test
          POSTGRES_USER: moneymate
          POSTGRES_PASSWORD: moneymate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneymate -d moneymate_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend API integration tests
        run: |
          docker run --rm --network host \
            -e MONEYMATE_TEST_DATABASE_URL="postgres://moneymate:moneymate@127.0.0.1:5432/moneymate_test?sslmode=disable" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/backend \
            golang:1.26-alpine go test -tags=integration ./internal/httpapi

  e2e-smoke:
    runs-on: ubuntu-latest
    needs:
      - validate
      - backend-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright tooling
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker services
        run: |
          docker compose build backend migrate seed frontend
          docker compose up -d postgres
          docker compose run --rm migrate
          docker compose run --rm seed
          docker compose up -d backend frontend

      - name: Wait for local services
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/healthz > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8080/healthz
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:5173 > /dev/null

      - name: Run Playwright smoke tests
        run: npm run e2e

      - name: Docker logs
        if: failure()
        run: docker compose logs --no-color backend frontend postgres

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
