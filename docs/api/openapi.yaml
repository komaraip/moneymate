components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived JWT access token from `/api/v1/auth/login` or `/api/v1/auth/refresh`.
    refreshCookie:
      type: apiKey
      in: cookie
      name: moneymate_refresh_token
      description: HTTP-only refresh cookie set by `/api/v1/auth/login`, scoped to `/api/v1/auth`.

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validation:
              value:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Input tidak valid
                  details: []
                request_id: req_123
    UnauthorizedError:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            unauthorized:
              value:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: Access token tidak valid
                request_id: req_123
    ForbiddenError:
      description: Authenticated user does not have permission for the action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            forbidden:
              value:
                success: false
                error:
                  code: FORBIDDEN
                  message: Kamu tidak memiliki akses untuk aksi ini
                request_id: req_123
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      required: [success, error, request_id]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorBody"
        request_id:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INTERNAL_ERROR, VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT]
        message:
          type: string
        details:
          type: array
          items:
            type: string

    HealthEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status, service, environment]
              properties:
                status:
                  type: string
                service:
                  type: string
                environment:
                  type: string

    SuccessEnvelope:
      type: object
      required: [success, request_id]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Endpoint-specific response data.
        meta:
          description: Optional endpoint metadata.
        request_id:
          type: string

    StatusEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status]
              properties:
                status:
                  type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [access_token, access_expires_at, user]
              properties:
                access_token:
                  type: string
                access_expires_at:
                  type: string
                  format: date-time
                user:
                  $ref: "#/components/schemas/User"

    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, full_name, role, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [admin, user]
        is_active:
          type: boolean
