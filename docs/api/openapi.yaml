        - transaction_totals_by_instrument
        - top_contributors
        - top_detractors
        - warnings
        - data_not_realtime
        - disclaimer
        - generated_at
      properties:
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
        base_currency:
          type: string
          example: IDR
        beginning_net_worth:
          type:
            - number
            - "null"
          description: Null when historical net worth cannot be accurately calculated from available snapshots and cash history.
        ending_net_worth:
          type: number
        net_worth_change:
          type:
            - number
            - "null"
        cash_balance:
          type: number
        cash_net_movement:
          type: number
          description: Net signed cash movement from cash adjustment ledger rows in the requested month.
        cash_movements:
          type: array
          items:
            $ref: "#/components/schemas/CashMovementTotal"
        portfolio_value:
          type: number
        portfolio_snapshot_date:
          type:
            - string
            - "null"
          format: date
        realized_profit_loss:
          type:
            - number
            - "null"
          description: Null in MVP because realized P/L method is not implemented.
        unrealized_profit_loss:
          type: number
        transaction_totals_by_asset_type:
          type: array
          items:
            $ref: "#/components/schemas/TransactionReportTotal"
        transaction_totals_by_instrument:
          type: array
          items:
