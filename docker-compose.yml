services:
  postgres:
    image: postgres:16-alpine
    container_name: moneymate-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneymate}
      POSTGRES_USER: ${POSTGRES_USER:-moneymate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneymate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: moneymate-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-moneymate}:${POSTGRES_PASSWORD:-moneymate}@postgres:5432/${POSTGRES_DB:-moneymate}?sslmode=disable
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      BASE_CURRENCY: ${BASE_CURRENCY:-IDR}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Jakarta}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: moneymate-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${APP_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  frontend-node-modules:
